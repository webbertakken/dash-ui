name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # Must run before tests because the @dash-ui/wc registration test
        # imports the built bundle at packages/wc/dist/index.js.
        run: pnpm build

      - name: Tests
        run: pnpm test

      - name: Build the static tri-framework site (proves all three storybooks build)
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: pnpm build:site

      - name: Upload site artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: apps/storybook-site/dist
          retention-days: 7
