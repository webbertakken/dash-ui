name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Node version from mise.toml
        id: node
        run:
          echo "version=$(grep -E '^node\s*=' mise.toml | sed -E 's/.*"([^"]+)".*/\1/')" >>
          "$GITHUB_OUTPUT"

      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node.outputs.version }}

      - name: Resolve yarn cache folder
        id: yarn-config
        run: echo "cacheFolder=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"

      - name: Restore yarn install cache (node_modules + cacheFolder + install-state)
        id: yarn-cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            ${{ steps.yarn-config.outputs.cacheFolder }}
            .yarn/install-state.gz
          key:
            yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-${{ hashFiles('yarn.lock')
            }}
          restore-keys: |
            yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-

      - name: Install deps
        env:
          YARN_ENABLE_HARDENED_MODE: 'false'
        run: |
          case "$(yarn --version)" in 1.*) echo 'expected up-to-date yarn version'; exit 1 ;; esac
          yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Typecheck (shipped packages)
        run: yarn typecheck

      - name: Build packages
        # Must run before tests because the @w5-ui/wc registration test
        # imports the built bundle at packages/wc/dist/index.js.
        run: yarn build

      - name: Tests
        run: yarn test

      - name: Build the static tri-framework site (proves all three storybooks build)
        env:
          STORYBOOK_DISABLE_TELEMETRY: '1'
        run: yarn build:site

      - name: Upload site artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: apps/storybook-site/dist
          retention-days: 7
