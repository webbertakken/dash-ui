name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Build the static tri-framework site (proves all three storybooks build)
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: pnpm build:site

      - name: Upload site artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: apps/storybook-site/dist
          retention-days: 7
