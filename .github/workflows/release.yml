name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    # Trusted Publishing: id-token: write lets npm CLI 11.5.1+ exchange a
    # short-lived OIDC token for an npm credential. No NPM_TOKEN secret needed.
    # contents: write is for changesets to push tags and the Version Packages PR.
    # pull-requests: write is for opening the Version Packages PR.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read Node version from mise.toml
        id: node
        run:
          echo "version=$(grep -E '^node\s*=' mise.toml | sed -E 's/.*"([^"]+)".*/\1/')" >>
          "$GITHUB_OUTPUT"

      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ steps.node.outputs.version }}
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to a Trusted Publishing-aware version
        # Node 22 ships with npm 10.x. Trusted Publishing (OIDC exchange) needs
        # npm >= 11.5.1. Pin to the 11.x line: npm@latest (12.x) requires
        # node >= 22.22.2, newer than the mise-pinned toolchain, and would
        # fail to install here.
        run: npm install -g npm@^11

      - name: Install deps
        env:
          YARN_ENABLE_HARDENED_MODE: 'false'
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn version-packages
          publish: yarn release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: npm CLI does Trusted Publishing via OIDC.
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Create GitHub Releases for major versions only
        # Tags created by changesets/action via the default GITHUB_TOKEN do not
        # trigger separate workflows (GitHub's anti-infinite-loop rule), so we
        # do the GH Release creation inline. Filter: version is X.0.0 with X>=1.
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "Published packages: $PUBLISHED"
          echo "$PUBLISHED" | jq -c '.[]' | while read -r entry; do
            name=$(echo "$entry" | jq -r '.name')
            version=$(echo "$entry" | jq -r '.version')
            if [[ "$version" =~ ^([0-9]+)\.0\.0$ ]] && (( BASH_REMATCH[1] >= 1 )); then
              tag="${name}@${version}"
              echo "Promoting $tag to GitHub Release"
              gh release create "$tag" \
                --title "$tag" \
                --generate-notes \
                --latest
            else
              echo "Skipping GitHub Release for $name@$version (not a >=1.0.0 major)"
            fi
          done
