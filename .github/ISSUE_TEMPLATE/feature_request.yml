name: Feature request
description: A new component, prop, or capability
title: "[feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - New component
        - New prop / variant on existing component
        - New token / motif
        - Tooling / build / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Who needs this and why?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Sketch the props / DOM / usage. Pseudo-code is fine.
      render: tsx
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
