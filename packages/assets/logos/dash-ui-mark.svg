<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Charcoal squircle (neutral-08), deliberately NOT the brand-blue gradient
       so the mark does not read as a product-app icon. The brand-blue sparkline
       is the only saturated colour, kept small as a design-system wink. -->
  <rect width="64" height="64" rx="14" fill="#1C1C1E"/>

  <!-- Layered dashboard panels. -->
  <rect x="22" y="12" width="30" height="22" rx="3" fill="#FFFFFF" fill-opacity="0.16"/>
  <rect x="12" y="28" width="30" height="22" rx="3" fill="#FFFFFF"/>

  <!-- Sparkline accent. -->
  <path d="M17 43 L22 39 L27 41 L32 35 L37 38"
        stroke="#006FFF" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
