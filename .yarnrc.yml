# Use the classic node_modules linker. PnP breaks too many tools (vite-plugin-svelte,
# storybook, various postinstall scripts). node_modules is the path of least resistance.
nodeLinker: node-modules

# Solo project; PRs are exclusively from the maintainer. Re-enable when accepting
# third-party PRs that auto-trigger CI without manual review.
enableHardenedMode: false

# Disable the npm package age gate so freshly published versions of
# `@typescript/native-preview` (a daily dev release) install without
# needing a manual `--no-min-age` override on every `yarn install`.
npmMinimalAgeGate: 0
